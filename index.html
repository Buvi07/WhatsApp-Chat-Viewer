<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WhatsApp Chat Viewer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background-color: #ece5dd;
    }
    .chat-container {
      max-width: 800px;
      margin: auto;
      padding: 10px;
      height: 80vh;
      overflow-y: auto;
    }
    .chat-message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      position: relative;
      min-width: 100px;
    }
    .sent {
      background-color: #dcf8c6;
      align-self: flex-end;
    }
    .received {
      background-color: #fff;
      align-self: flex-start;
    }
    .chat-bubble {
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .chat-day {
      text-align: center;
      margin: 15px 0;
      font-size: 0.85rem;
      color: #555;
      background-color: #e5ddd5;
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
    }
    img, video {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 5px;
    }
    .time-label {
      font-size: 0.7rem;
      color: #555;
      text-align: right;
      margin-top: 2px;
    }
    
    /* PDF Export Styles */
    @media print {
      .chat-container {
        height: auto;
        overflow: visible;
        max-height: none;
      }
      .chat-message {
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .chat-day {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }
  </style>
</head>

<body>

<div class="container py-3">
  <h2 class="text-center mb-4">WhatsApp Chat Viewer</h2>

  <div class="row g-3">
    <div class="col-12 col-md-6">
      <label class="form-label">1 Load chat .txt
      <input type="file" id="chatFile" class="form-control" accept=".txt" />
      </label>
    </div>

    <div class="col-12 col-md-6">
      <label class="form-label">2 Load media .zip
      <input type="file" id="zipFile" class="form-control" accept=".zip" />
      </label>
    </div>
  </div>

  <!-- ✅ ACTION BUTTONS -->
  <div class="row g-3 mt-3">
    <div class="col-12 col-md-6">
      <button id="loadBtn" class="btn btn-success w-100" disabled>
        View Chat
      </button>
    </div>
    <div class="col-12 col-md-6">
      <button id="exportPdfBtn" class="btn btn-danger w-100" disabled>
        Export as PDF
      </button>
    </div>
  </div>

  <div id="chatOutput" class="chat-container d-flex flex-column mt-4"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

let mediaFiles = {};
let myName = "";

let chatLoaded = false;
let zipLoaded = false;

// ✅ Enable button when ready
function updateButton() {
  const btn = document.getElementById("loadBtn");
  if (chatLoaded) {
    btn.disabled = false;
  }
}

function parseChat(text) {
  const lines = text.split(/\r?\n/);
  chatData = [];

  let currentMsg = null;

  const regex = /^(\d{1,2}\/\d{1,2}\/\d{2,4}),\s([\d:]+)\s?(am|pm|AM|PM)\s-\s([^:]+):\s?(.*)$/;

  for (let line of lines) {
    const match = line.match(regex);

    if (match) {
      let [_, datePart, timePart, meridian, sender, message] = match;

      // Convert to proper date format (YYYY-MM-DD)
      let [day, month, year] = datePart.split("/");
      if (year.length === 2) year = "20" + year;

      const formattedDate = `${year}-${month.padStart(2, "0")}-${day.padStart(2, "0")}`;
      const formattedTime = `${timePart} ${meridian.toUpperCase()}`;

      currentMsg = {
        date: `${formattedDate} ${formattedTime}`,
        sender: sender.trim(),
        message
      };

      chatData.push(currentMsg);
    } else if (currentMsg) {
      // multiline message support
      currentMsg.message += "\n" + line;
    }
  }

  console.log("Parsed messages:", chatData.length);

  if (chatData.length > 0) {
    myName = chatData[0].sender;
  }
}

function renderChat() {
  const container = document.getElementById("chatOutput");

  if (!container) {
    console.error("chatOutput div not found!");
    return;
  }

  container.innerHTML = "";

  if (chatData.length === 0) {
    container.innerHTML = "<p class='text-center text-danger'>No messages found!</p>";
    return;
  }

  let lastDate = "";

  chatData.forEach((msg) => {
    try {
      const parts = msg.date.split(" ");
      const msgDateOnly = parts[0];

      // ✅ Date divider
      if (msgDateOnly !== lastDate) {
        const dateDivider = document.createElement("div");
        dateDivider.className = "chat-day mx-auto";
        dateDivider.textContent = new Date(msgDateOnly).toDateString();
        container.appendChild(dateDivider);
        lastDate = msgDateOnly;
      }

      // ✅ Message bubble
      const bubble = document.createElement("div");
      bubble.className =
        "chat-message " +
        (msg.sender === myName ? "sent ms-auto" : "received me-auto");

      // ✅ Sender
      const senderName = document.createElement("small");
      senderName.className = "fw-bold mb-1";
      senderName.textContent = msg.sender;
      bubble.appendChild(senderName);

      // ✅ Message content
      const messageDiv = document.createElement("div");
      messageDiv.className = "chat-bubble";

      // safer rendering
      messageDiv.innerHTML = formatMessageSafe(msg.message);

      bubble.appendChild(messageDiv);

      // ✅ Time
      const timeDiv = document.createElement("div");
      timeDiv.className = "time-label";
      timeDiv.textContent = parts[1] ? parts[1] + " " + (parts[2] || "") : "";
      bubble.appendChild(timeDiv);

      container.appendChild(bubble);

    } catch (err) {
      console.error("Error rendering message:", msg, err);
    }

    document.getElementById("exportPdfBtn").disabled = false;
  });

  // ✅ Scroll to bottom
  container.scrollTop = container.scrollHeight;
}

function formatMessageSafe(msg) {
  const attachMatch = msg.match(/<attached:\s*(.*?)>/);

  if (attachMatch) {
    const fileName = attachMatch[1].trim().split("/").pop();

    if (mediaFiles[fileName]) {
      const ext = fileName.split(".").pop().toLowerCase();

      if (["jpg", "jpeg", "png", "webp"].includes(ext)) {
        return `<img src="${mediaFiles[fileName]}">`;
      } else if (["mp4", "webm"].includes(ext)) {
        return `<video controls src="${mediaFiles[fileName]}"></video>`;
      } else {
        return `<a href="${mediaFiles[fileName]}" download>${fileName}</a>`;
      }
    }

    return `<span class="text-muted">${fileName} (missing)</span>`;
  }

  // ✅ SAFE TEXT (fixes broken rendering)
  return msg.replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ✅ Prevent XSS
function sanitizeHTML(str) {
  return str.replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ✅ Load chat file
document.getElementById("chatFile").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    parseChat(e.target.result);
    chatLoaded = true;
    updateButton();
  };
  reader.readAsText(file);
});

// ✅ Load ZIP
document.getElementById("zipFile").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  JSZip.loadAsync(file).then((zip) => {
    const promises = [];

    zip.forEach((relativePath, zipEntry) => {
      promises.push(
        zipEntry.async("base64").then((data) => {
          const fileName = zipEntry.name.split("/").pop();
          const ext = fileName.split(".").pop().toLowerCase();

          let mime = "application/octet-stream";

          if (["jpg", "jpeg", "png", "webp"].includes(ext))
            mime = `image/${ext === "jpg" ? "jpeg" : ext}`;
          else if (ext === "mp4") mime = "video/mp4";
          else if (ext === "webm") mime = "video/webm";

          mediaFiles[fileName] = `data:${mime};base64,${data}`;
        })
      );
    });

    Promise.all(promises).then(() => {
      zipLoaded = true;
      updateButton();
    });
  });
});

// export to pdf
document.getElementById("exportPdfBtn").addEventListener("click", () => {
  const element = document.getElementById("chatOutput");

  if (!element || element.innerHTML.trim() === "") {
    alert("No chat to export!");
    return;
  }

  // Create a temporary wrapper with proper styling
  const wrapper = document.createElement("div");
  wrapper.style.position = "fixed";
  wrapper.style.top = "0";
  wrapper.style.left = "0";
  wrapper.style.width = "800px";
  wrapper.style.zIndex = "-9999";
  wrapper.style.backgroundColor = "#ece5dd";
  wrapper.style.padding = "20px";
  wrapper.style.visibility = "hidden";
  wrapper.style.lineHeight = "1.5";
  
  // Clone and copy all content
  const clone = element.cloneNode(true);
  clone.style.height = "auto";
  clone.style.maxHeight = "none";
  clone.style.overflow = "visible";
  clone.style.display = "block";
  
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  // Wait for rendering
  setTimeout(() => {
    const opt = {
      margin: [15, 15, 15, 15],
      filename: "WhatsApp_Chat.pdf",
      image: { type: "jpeg", quality: 0.99 },
      html2canvas: { 
        scale: 2,
        windowHeight: wrapper.scrollHeight + 100,
        useCORS: true,
        logging: false
      },
      jsPDF: { 
        unit: "mm", 
        format: "a4", 
        orientation: "portrait",
        compress: true
      }
    };

    html2pdf()
      .set(opt)
      .from(clone)
      .save()
      .finally(() => {
        document.body.removeChild(wrapper);
      });
  }, 500);
});

// ✅ Button click
document.getElementById("loadBtn").addEventListener("click", () => {
  renderChat();
});
